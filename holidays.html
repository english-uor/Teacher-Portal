<!DOCTYPE html>
<html lang="en" class="dark">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="image_0cf63c.png">
    <link rel="apple-touch-icon" href="image_0cf63c.png">
    
    <meta name="theme-color" content="#050B14" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enables manual dark mode toggling via 'dark' class on HTML tag
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        kurdish: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif', 'Arial'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                            950: '#050B14'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Hide scrollbars elegantly */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .active-pill {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
            color: white !important;
        }

        /* Ambient background movement */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(25px, -40px) scale(1.08); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 12s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.96) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-card {
            animation: cardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Beautiful rotating LED stroke around next holiday window */
        .led-border-window {
            position: relative;
            overflow: hidden;
        }
        .led-border-window::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 20%, #3b82f6, #8b5cf6, #ec4899, transparent 80%);
            animation: rotateLED 5s linear infinite;
            z-index: 0;
        }
        .led-border-inner {
            position: relative;
            z-index: 1;
            margin: 3px;
        }
        @keyframes rotateLED {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        { type: 'occasion', m: 8, d: [7], text: "ڕۆژی شەهیدانی ئاشووریان", dateStr: "٨/٧", icon: "flame", theme: "red" },
        { type: 'occasion', m: 8, d: [25], text: "ساڵیادی قوربانیانی ئەنفالکردنی بادینان", dateStr: "٨/٢٥", icon: "eye", theme: "slate" },
        { type: 'occasion', m: 9, d: [11], text: "ساڵیادی هەڵگیرسانی شۆڕشی ئەیلوول", dateStr: "٩/١١", icon: "mountain", theme: "amber" },
        { type: 'occasion', m: 9, d: [21], text: "ساڵیادی دامەزراندنی یەکێتیی زانایانی ئیسلامیی کوردستان", dateStr: "٩/٢١", icon: "book-open", theme: "teal" },
        { type: 'occasion', m: 11, d: [17], text: "ڕۆژی زمان و کولتوری پێکهاتەی تورکمان", dateStr: "١١/١٧", icon: "languages", theme: "indigo" },
        { type: 'occasion', m: 12, d: [17], text: "ڕۆژی ئاڵای کوردستان", dateStr: "١٢/١٧", icon: "flag", theme: "red" }
    ];

    const monthsKurdishMap = {
        1: "کانوونی دووەم (January)", 2: "شوبات (February)", 3: "ئادار (March)",
        4: "نیسان (April)", 5: "ئایار (May)", 6: "حوزەیران (June)",
        7: "تەممووز (July)", 8: "ئاب (August)", 9: "ئەیلوول (September)",
        10: "تشرینی یەکەم (October)", 11: "تشرینی دووەم (November)", 12: "کانوونی یەکەم (December)"
    };

    let activeType = 'holiday';
    let activeFilter = 'year'; 
    let searchQuery = '';
    let countdownInterval = null;

    document.addEventListener('DOMContentLoaded', () => {
        syncTheme();
        calculateAndSetNextUpcoming();
        renderTimeline();
    });

    // Share functionality
    function shareUpcoming() {
        const title = document.getElementById('hero-title').innerText;
        const date = document.getElementById('hero-date-badge').innerText;
        const text = `بۆنەی داهاتوو: ${title} لە ${date}\nلە ڕێگەی Enghub ەوە`;
        
        // Creating a temporary textarea to copy text (works universally)
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            showToast();
        } catch (err) {
            console.error('Failed to copy', err);
        }
        document.body.removeChild(textArea);
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('opacity-0', 'translate-y-10');
        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-y-10');
        }, 3500);
    }

    // Theme toggling functionality
    function syncTheme() {
        const isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const icon = document.getElementById('theme-icon');
        
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-color-meta').setAttribute('content', '#050B14');
            if(icon) icon.setAttribute('data-lucide', 'sun');
        } else {
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-color-meta').setAttribute('content', '#f8fafc');
            if(icon) icon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons();
    }

    function toggleTheme() {
        const isDark = document.documentElement.classList.contains('dark');
        const icon = document.getElementById('theme-icon');
        
        if (isDark) {
            document.documentElement.classList.remove('dark');
            localStorage.theme = 'light';
            document.getElementById('theme-color-meta').setAttribute('content', '#f8fafc');
            icon.setAttribute('data-lucide', 'moon');
        } else {
            document.documentElement.classList.add('dark');
            localStorage.theme = 'dark';
            document.getElementById('theme-color-meta').setAttribute('content', '#050B14');
            icon.setAttribute('data-lucide', 'sun');
        }
        lucide.createIcons();
    }

    function switchType(type) {
        activeType = type;
        ['holiday', 'occasion'].forEach(t => {
            const btn = document.getElementById(`tab-${t}`);
            if (t === type) {
                btn.classList.add('active-pill');
                btn.classList.remove('text-slate-500', 'dark:text-slate-400', 'hover:text-slate-800', 'dark:hover:text-slate-200');
            } else {
                btn.classList.remove('active-pill');
                btn.classList.add('text-slate-500', 'dark:text-slate-400', 'hover:text-slate-800', 'dark:hover:text-slate-200');
            }
        });
        renderTimeline();
    }

    function switchFilter(filter) {
        activeFilter = filter;
        ['day', 'week', 'month', 'year'].forEach(f => {
            const btn = document.getElementById(`filter-${f}`);
            if (f === filter) {
                btn.classList.add('active-pill');
                btn.classList.remove('text-slate-500', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-slate-800');
            } else {
                btn.classList.remove('active-pill');
                btn.classList.add('text-slate-500', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-slate-800');
            }
        });
        renderTimeline();
    }

    function performSearch() {
        searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
        renderTimeline();
    }

    // Advanced search to bridge english digits to kurdish formats
    function cleanNumeral(str) {
        const replaceMap = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
        return str.replace(/[٠-٩]/g, d => replaceMap[d]);
    }

    // Engine: Calculates next chronological event of 2026 and sets countdown timer
    function calculateAndSetNextUpcoming() {
        const now = new Date();
        const currentYr = new Date().getFullYear(); // System base anchor matching Kurdish directory context
        const sysTime = new Date(currentYr, now.getMonth(), now.getDate(), now.getHours(), now.getMinutes());

        let absoluteUpcoming = null;
        let minimumDiff = Infinity;

        database.forEach(item => {
            item.d.forEach(day => {
                const targetDate = new Date(currentYr, item.m - 1, day);
                const diff = targetDate - sysTime;
                
                if (diff > 0 && diff < minimumDiff) {
                    minimumDiff = diff;
                    absoluteUpcoming = { ...item, dayTarget: day };
                }
            });
        });

        // Fallback to first event of next year cycle if all events this year passed
        if (!absoluteUpcoming) {
            let earliestEvent = database[0];
            absoluteUpcoming = { ...earliestEvent, dayTarget: earliestEvent.d[0] };
        }

        if (absoluteUpcoming) {
            document.getElementById('countdown-section').classList.remove('hidden');
            document.getElementById('hero-title').textContent = absoluteUpcoming.text;
            document.getElementById('hero-type-badge').textContent = absoluteUpcoming.type === 'holiday' ? 'پشووی فەرمی' : 'بۆنەی نیشتمانی';
            const targetDate = new Date(currentYr, absoluteUpcoming.m - 1, absoluteUpcoming.dayTarget); 
            const weekdays = ["یەکشەممە", "دووشەممە", "سێشەممە", "چوارشەممە", "پێنجشەممە", "هەینی", "شەممە"];
            document.getElementById('hero-date-badge').textContent = `${weekdays[targetDate.getDay()]} ${absoluteUpcoming.dateStr}`;

            if(countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const innerNow = new Date();
                const d = targetDate - innerNow;
                if(d <= 0) {
                    clearInterval(countdownInterval);
                    calculateAndSetNextUpcoming(); // Cycle again automatically
                    return;
                }
                const days = Math.floor(d / (1000 * 60 * 60 * 24));
                const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));

                document.getElementById('timer-days').textContent = days.toString().padStart(2, '0');
                document.getElementById('timer-hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('timer-minutes').textContent = mins.toString().padStart(2, '0');
            }, 1000);
        }
    }

    function renderTimeline() {
        const container = document.getElementById('directory-render-target');
        container.innerHTML = '';

        const now = new Date();
        const currentM = now.getMonth() + 1;
        const currentD = now.getDate();
        
        let filtered = database.filter(item => {
            if(item.type !== activeType) return false;
            
            if(searchQuery) {
                const cleanStr = cleanNumeral(searchQuery);
                return item.text.toLowerCase().includes(searchQuery) || item.dateStr.includes(cleanStr);
            }

            if(activeFilter === 'year') return true;
            if(activeFilter === 'month') return item.m === currentM;
            if(activeFilter === 'week') {
                return item.m === currentM && item.d.some(day => day >= currentD && day <= currentD + 7);
            }
            if(activeFilter === 'day') {
                return item.m === currentM && item.d.includes(currentD);
            }
            return true;
        });

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="py-12 text-center text-slate-400 dark:text-slate-500 font-kurdish">
                    <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
                    <p>هیچ زانیارییەک نەدۆزرایەوە بۆ ئەم فلتەرە.</p>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        // Group by month
        const grouped = {};
        filtered.forEach(item => {
            if(!grouped[item.m]) grouped[item.m] = [];
            grouped[item.m].push(item);
        });

        // Loop the groups to make view HTML
        Object.keys(grouped).sort((a,b) => a-b).forEach(month => {
            // Month Header Map Segment
            const monthHeader = document.createElement('div');
            monthHeader.className = "sticky top-20 z-30 pt-4 pb-2 bg-slate-50/90 dark:bg-[#050B14]/90 backdrop-blur-md";
            monthHeader.innerHTML = `
                <div class="flex items-center gap-3" dir="rtl">
                    <div class="h-px flex-1 bg-slate-200 dark:bg-white/10"></div>
                    <span class="text-xs font-black text-slate-400 dark:text-slate-500 px-3 py-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/5 rounded-full font-kurdish">${monthsKurdishMap[month]}</span>
                    <div class="h-px flex-1 bg-slate-200 dark:bg-white/10"></div>
                </div>
            `;
            container.appendChild(monthHeader);

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 sm:grid-cols-2 gap-3";

            grouped[month].forEach((item, index) => {
                const delay = index * 0.05;
                const isPassed = (item.m < currentM) || (item.m === currentM && Math.max(...item.d) < currentD);
                
                // Color configuration parsing based on element definitions
                const tColors = {
                    amber: "bg-amber-100 text-amber-600 dark:bg-amber-500/10 dark:text-amber-400 border-amber-200 dark:border-amber-500/20",
                    red: "bg-red-100 text-red-600 dark:bg-red-500/10 dark:text-red-400 border-red-200 dark:border-red-500/20",
                    blue: "bg-blue-100 text-blue-600 dark:bg-blue-500/10 dark:text-blue-400 border-blue-200 dark:border-blue-500/20",
                    yellow: "bg-yellow-100 text-yellow-600 dark:bg-yellow-500/10 dark:text-yellow-400 border-yellow-200 dark:border-yellow-500/20",
                    indigo: "bg-indigo-100 text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-400 border-indigo-200 dark:border-indigo-500/20",
                    orange: "bg-orange-100 text-orange-600 dark:bg-orange-500/10 dark:text-orange-400 border-orange-200 dark:border-orange-500/20",
                    teal: "bg-teal-100 text-teal-600 dark:bg-teal-500/10 dark:text-teal-400 border-teal-200 dark:border-teal-500/20",
                    emerald: "bg-emerald-100 text-emerald-600 dark:bg-emerald-500/10 dark:text-emerald-400 border-emerald-200 dark:border-emerald-500/20",
                    sky: "bg-sky-100 text-sky-600 dark:bg-sky-500/10 dark:text-sky-400 border-sky-200 dark:border-sky-500/20",
                    pink: "bg-pink-100 text-pink-600 dark:bg-pink-500/10 dark:text-pink-400 border-pink-200 dark:border-pink-500/20",
                    purple: "bg-purple-100 text-purple-600 dark:bg-purple-500/10 dark:text-purple-400 border-purple-200 dark:border-purple-500/20",
                    green: "bg-green-100 text-green-600 dark:bg-green-500/10 dark:text-green-400 border-green-200 dark:border-green-500/20",
                    rose: "bg-rose-100 text-rose-600 dark:bg-rose-500/10 dark:text-rose-400 border-rose-200 dark:border-rose-500/20",
                    slate: "bg-slate-100 text-slate-600 dark:bg-slate-500/10 dark:text-slate-400 border-slate-200 dark:border-slate-500/20",
                };
                
                const badgeColor = tColors[item.theme] || tColors.blue;

                const cardHtml = `
                    <div class="bg-white/80 dark:bg-slate-900/60 backdrop-blur-sm border border-slate-200 dark:border-white/5 rounded-2xl p-4 flex gap-4 transition-all duration-300 hover:shadow-lg animate-card ${isPassed ? 'opacity-60 grayscale-[0.3]' : ''}" style="animation-delay: ${delay}s" dir="rtl">
                        <div class="w-12 h-12 shrink-0 rounded-[1rem] flex items-center justify-center border shadow-sm ${badgeColor}">
                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex flex-col justify-center gap-1 flex-1">
                            <h3 class="text-[13px] sm:text-sm font-bold text-slate-800 dark:text-slate-100 font-kurdish leading-snug">${item.text}</h3>
                            <div class="flex items-center gap-2 text-xs font-black text-slate-400 dark:text-slate-500 mt-1 font-mono tracking-widest">
                                <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${item.dateStr}
                                ${isPassed ? '<span class="px-2 py-0.5 rounded-md bg-slate-100 dark:bg-slate-800 text-[9px] font-kurdish font-bold">تێپەڕی</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });

            container.appendChild(grid);
        });

        lucide.createIcons();
    }
</script>
</body>
</html>
